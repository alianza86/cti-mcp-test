services:
  db:
    image: postgres:16
    container_name: mcp-library-db
    environment:
      POSTGRES_USER: library
      POSTGRES_PASSWORD: library
      POSTGRES_DB: library
    ports:
      # Host 5433 -> contenedor 5432 (el 5432 del host ya estaba ocupado)
      - "5433:5432"
    volumes:
      # El seed lo carga la app (server.py -> init_db) al arrancar; aquí solo
      # levantamos Postgres vacío y persistimos los datos.
      - library_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U library -d library"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  library_data:
